{% set name = "puremagic" %}
{% set version = "2.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: eb4bddf07c177c4b434554b92165b67449f5a51e152b976202d6254498810eef

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
  run:
    - python

test:
  source_files:
    - test
  imports:
    - puremagic
  commands:
    - pip check
    - pytest -v test
  requires:
    - pip
    - pytest

about:
  home: https://github.com/cdgriffith/puremagic
  summary: Pure python implementation of magic file detection
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: |
    Pure python implementation of identifying files based off their magic numbers
  dev_url: https://github.com/cdgriffith/puremagic
  doc_url: https://github.com/cdgriffith/puremagic/blob/master/README.rst

extra:
  recipe-maintainers:
    - andreyz4k
